name: CI - Validate Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install apache-airflow==2.10.0 \
            opensearch-py \
            pandas \
            flake8

      - name: Lint with flake8
        run: |
          flake8 airflow/dags/ \
            --max-line-length=120 \
            --ignore=E221,E241,E302,E226,E272,F541,W293,E261,E305,F401 \
            --exclude=__pycache__,scripts/

      - name: Validate DAG syntax
        run: |
          python -c "
          import ast
          import sys
          import os

          dag_dir = 'airflow/dags'
          errors = []

          for f in os.listdir(dag_dir):
              if f.endswith('.py') and not f.startswith('_'):
                  path = os.path.join(dag_dir, f)
                  try:
                      with open(path) as file:
                          ast.parse(file.read())
                      print(f'✅ {f} - syntax OK')
                  except SyntaxError as e:
                      errors.append(f'❌ {f} - {e}')

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          "

      - name: Check DAG imports
        run: |
          python -c "
          from airflow import DAG
          from airflow.operators.python import PythonOperator
          print('✅ Airflow imports OK')
          "
